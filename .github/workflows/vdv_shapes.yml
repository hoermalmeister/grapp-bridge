name: VDV Shapes Routing (Segmented)

on:
  schedule:
    - cron: '0 2 * * 6' # Každou sobotu
  workflow_dispatch:

jobs:
  build-shapes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalace závislostí
        run: pip install pandas requests

      - name: Generování tras po segmentech
        run: python scripts/build_vdv_shapes.py

      - name: Commit a Push změn
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/vdv_segments.json data/vdv_trips.json
          git commit -m "🤖 Inkrementální aktualizace VDV tras" || echo "Žádné změny k uložení"
          git push
