name: VDV Shapes Routing (Segmented)

on:
  schedule:
    - cron: '0 2 * * 6' # Každou sobotu ve 2:00 ráno
  workflow_dispatch: # Možnost manuálního spuštění

jobs:
  build-shapes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Instalace Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stáhnout a rozbalit GTFS (Linux Native)
        run: |
          mkdir -p gtfs_raw
          curl -L -f -o gtfs.zip https://www.spojenka.cz/jrdata/jizdnirady-gtfs.zip
          unzip -o gtfs.zip -d gtfs_raw stops.txt routes.txt trips.txt stop_times.txt
          rm gtfs.zip

      - name: Generování tras po segmentech
        run: node scripts/update_vdv_shapes.js

      - name: Commit a Push změn
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Přidáno -f (force) pro případ, že by data/ byla v .gitignore
          git add -f data/vdv_segments.json data/vdv_trips.json
          git commit -m "🤖 Automatická aktualizace VDV tras (segmenty)" || echo "Žádné změny k uložení"
          git push
